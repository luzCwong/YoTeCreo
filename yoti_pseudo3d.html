<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Yoti Niños — Pseudo-3D</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:linear-gradient(160deg,#0F0A2A,#1A1040,#0D0820);min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Nunito',sans-serif;}
.wrap{display:flex;flex-direction:column;align-items:center;gap:16px;padding:48px 32px;}
@keyframes yFloat{0%,100%{transform:translateY(0) rotate(0deg)}25%{transform:translateY(-12px) rotate(.8deg)}75%{transform:translateY(-6px) rotate(-.5deg)}}
@keyframes heartFloat1{0%,100%{transform:translate(0,0) scale(1);opacity:.9}50%{transform:translate(-8px,-22px) scale(1.1);opacity:.3}}
@keyframes heartFloat2{0%,100%{transform:translate(0,0) scale(.85);opacity:.75}50%{transform:translate(8px,-20px) scale(.95);opacity:.2}}
@keyframes heartFloat3{0%,100%{transform:translate(0,0) scale(1.1);opacity:.6}50%{transform:translate(0,-26px) scale(1.2);opacity:.15}}
.yoti-svg{animation:yFloat 3.5s ease-in-out infinite;}
.title{font-size:13px;font-weight:800;color:rgba(167,139,250,.5);letter-spacing:2px;text-transform:uppercase;text-align:center;}
.subtitle{font-size:11px;color:rgba(167,139,250,.25);letter-spacing:1px;text-align:center;margin-top:4px;}
</style>
</head>
<body>
<div class="wrap">
<svg class="yoti-svg" width="320" height="320" viewBox="100 120 480 440" xmlns="http://www.w3.org/2000/svg">
<defs>
  <radialGradient id="bodyMain" cx="38%" cy="28%" r="65%">
    <stop offset="0%" stop-color="#c4b5fd"/>
    <stop offset="35%" stop-color="#8b5cf6"/>
    <stop offset="70%" stop-color="#6d28d9"/>
    <stop offset="100%" stop-color="#3b0764"/>
  </radialGradient>
  <radialGradient id="bellyGrad" cx="48%" cy="35%" r="58%">
    <stop offset="0%" stop-color="#faf5ff"/>
    <stop offset="40%" stop-color="#ede9fe"/>
    <stop offset="100%" stop-color="#ddd6fe"/>
  </radialGradient>
  <radialGradient id="specTop" cx="40%" cy="20%" r="50%">
    <stop offset="0%" stop-color="white" stop-opacity=".55"/>
    <stop offset="100%" stop-color="white" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="earInner" cx="50%" cy="55%" r="55%">
    <stop offset="0%" stop-color="#f9a8d4"/>
    <stop offset="100%" stop-color="#ec4899"/>
  </radialGradient>
  <radialGradient id="eyeWhite" cx="45%" cy="38%" r="58%">
    <stop offset="0%" stop-color="white"/>
    <stop offset="100%" stop-color="#f0e8ff"/>
  </radialGradient>
  <radialGradient id="irisGrad" cx="38%" cy="32%" r="60%">
    <stop offset="0%" stop-color="#7c3aed"/>
    <stop offset="55%" stop-color="#4c1d95"/>
    <stop offset="100%" stop-color="#1e1b4b"/>
  </radialGradient>
  <radialGradient id="pupilGrad" cx="40%" cy="35%" r="60%">
    <stop offset="0%" stop-color="#2e1065"/>
    <stop offset="100%" stop-color="#0a0520"/>
  </radialGradient>
  <radialGradient id="blushL" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#fda4af" stop-opacity=".85"/>
    <stop offset="70%" stop-color="#fb7185" stop-opacity=".3"/>
    <stop offset="100%" stop-color="#fb7185" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="blushR" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#fda4af" stop-opacity=".85"/>
    <stop offset="70%" stop-color="#fb7185" stop-opacity=".3"/>
    <stop offset="100%" stop-color="#fb7185" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="shieldGold" cx="40%" cy="25%" r="65%">
    <stop offset="0%" stop-color="#fde68a"/>
    <stop offset="55%" stop-color="#f59e0b"/>
    <stop offset="100%" stop-color="#b45309"/>
  </radialGradient>
  <radialGradient id="heartGrad" cx="50%" cy="25%" r="65%">
    <stop offset="0%" stop-color="#fda4af"/>
    <stop offset="100%" stop-color="#e11d48"/>
  </radialGradient>
  <radialGradient id="shadowGrad" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#3b0764" stop-opacity=".5"/>
    <stop offset="100%" stop-color="#3b0764" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="rimLight" cx="5%" cy="55%" r="55%">
    <stop offset="0%" stop-color="#c026d3" stop-opacity=".35"/>
    <stop offset="100%" stop-color="#c026d3" stop-opacity="0"/>
  </radialGradient>
  <filter id="softBlur"><feGaussianBlur stdDeviation="6"/></filter>
  <filter id="midBlur"><feGaussianBlur stdDeviation="3"/></filter>
  <filter id="tinyBlur"><feGaussianBlur stdDeviation="1.5"/></filter>
  <clipPath id="eyeLClip"><ellipse cx="308" cy="284" rx="24" ry="26"/></clipPath>
  <clipPath id="eyeRClip"><ellipse cx="372" cy="284" rx="24" ry="26"/></clipPath>
</defs>

<!-- GROUND SHADOW -->
<ellipse cx="340" cy="510" rx="88" ry="13" fill="url(#shadowGrad)" filter="url(#softBlur)"/>

<g>
  <animateTransform attributeName="transform" type="translate" values="0,0;0,-12;0,-6;0,0" dur="3.5s" repeatCount="indefinite" calcMode="spline" keySplines=".45 .05 .55 .95;.45 .05 .55 .95;.45 .05 .55 .95"/>

  <!-- Ambient glow -->
  <ellipse cx="340" cy="340" rx="148" ry="138" fill="#7c3aed" opacity=".1" filter="url(#softBlur)"/>

  <!-- EARS -->
  <ellipse cx="228" cy="244" rx="30" ry="40" fill="#6d28d9" transform="rotate(-20,228,244)"/>
  <ellipse cx="228" cy="244" rx="22" ry="32" fill="#5b21b6" opacity=".7" transform="rotate(-20,228,244)"/>
  <ellipse cx="228" cy="248" rx="13" ry="22" fill="url(#earInner)" transform="rotate(-20,228,244)" opacity=".85"/>
  <ellipse cx="222" cy="232" rx="6" ry="10" fill="white" opacity=".22" transform="rotate(-20,222,232)"/>
  <ellipse cx="452" cy="244" rx="30" ry="40" fill="#6d28d9" transform="rotate(20,452,244)"/>
  <ellipse cx="452" cy="244" rx="22" ry="32" fill="#5b21b6" opacity=".7" transform="rotate(20,452,244)"/>
  <ellipse cx="452" cy="248" rx="13" ry="22" fill="url(#earInner)" transform="rotate(20,452,248)" opacity=".85"/>
  <ellipse cx="446" cy="232" rx="6" ry="10" fill="white" opacity=".22" transform="rotate(20,446,232)"/>

  <!-- BODY -->
  <ellipse cx="362" cy="338" rx="95" ry="92" fill="#3b0764" opacity=".35" filter="url(#tinyBlur)"/>
  <ellipse cx="340" cy="330" rx="112" ry="109" fill="url(#bodyMain)"/>
  <ellipse cx="340" cy="330" rx="112" ry="109" fill="url(#rimLight)"/>
  <ellipse cx="340" cy="330" rx="112" ry="109" fill="url(#specTop)"/>
  <ellipse cx="340" cy="295" rx="72" ry="28" fill="white" opacity=".06"/>

  <!-- BELLY -->
  <ellipse cx="340" cy="355" rx="68" ry="64" fill="url(#bellyGrad)"/>
  <ellipse cx="350" cy="368" rx="55" ry="52" fill="#7c3aed" opacity=".1" filter="url(#tinyBlur)"/>
  <ellipse cx="330" cy="330" rx="30" ry="20" fill="white" opacity=".18"/>

  <!-- EYES -->
  <ellipse cx="308" cy="286" rx="28" ry="30" fill="#2e1065" opacity=".5" filter="url(#tinyBlur)"/>
  <ellipse cx="308" cy="284" rx="24" ry="26" fill="url(#eyeWhite)"/>
  <ellipse cx="310" cy="287" rx="16" ry="17" fill="url(#irisGrad)"/>
  <ellipse cx="312" cy="288" rx="9" ry="10" fill="url(#pupilGrad)"/>
  <ellipse cx="306" cy="281" rx="5.5" ry="5.5" fill="white" opacity=".95"/>
  <ellipse cx="317" cy="292" rx="2.5" ry="2.5" fill="white" opacity=".55"/>
  <ellipse cx="310" cy="287" rx="16" ry="17" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity=".4"/>
  <ellipse cx="308" cy="271" rx="24" ry="10" fill="#2e1065" opacity=".35" clip-path="url(#eyeLClip)"/>

  <ellipse cx="372" cy="286" rx="28" ry="30" fill="#2e1065" opacity=".5" filter="url(#tinyBlur)"/>
  <ellipse cx="372" cy="284" rx="24" ry="26" fill="url(#eyeWhite)"/>
  <ellipse cx="374" cy="287" rx="16" ry="17" fill="url(#irisGrad)"/>
  <ellipse cx="376" cy="288" rx="9" ry="10" fill="url(#pupilGrad)"/>
  <ellipse cx="370" cy="281" rx="5.5" ry="5.5" fill="white" opacity=".95"/>
  <ellipse cx="381" cy="292" rx="2.5" ry="2.5" fill="white" opacity=".55"/>
  <ellipse cx="374" cy="287" rx="16" ry="17" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity=".4"/>
  <ellipse cx="372" cy="271" rx="24" ry="10" fill="#2e1065" opacity=".35" clip-path="url(#eyeRClip)"/>

  <!-- EYEBROWS -->
  <path d="M290 260 Q308 250 326 258" stroke="#3b0764" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M290 260 Q308 250 326 258" stroke="#5b21b6" stroke-width="2.5" fill="none" stroke-linecap="round" opacity=".5"/>
  <path d="M354 258 Q372 250 390 260" stroke="#3b0764" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M354 258 Q372 250 390 260" stroke="#5b21b6" stroke-width="2.5" fill="none" stroke-linecap="round" opacity=".5"/>

  <!-- NOSE -->
  <ellipse cx="340" cy="308" rx="8" ry="6" fill="#4c1d95" opacity=".6"/>
  <ellipse cx="337" cy="306" rx="3" ry="2" fill="white" opacity=".3"/>

  <!-- CHEEKS -->
  <ellipse cx="278" cy="316" rx="28" ry="18" fill="url(#blushL)"/>
  <ellipse cx="402" cy="316" rx="28" ry="18" fill="url(#blushR)"/>

  <!-- MOUTH -->
  <path d="M308 332 Q340 364 372 332" stroke="#4c1d95" stroke-width="5.5" fill="none" stroke-linecap="round"/>
  <path d="M308 332 Q340 364 372 332" stroke="#7c3aed" stroke-width="2.5" fill="none" stroke-linecap="round" opacity=".4"/>
  <ellipse cx="340" cy="354" rx="13" ry="9" fill="#fb7185"/>
  <ellipse cx="340" cy="352" rx="13" ry="9" fill="#f472b6" opacity=".6"/>
  <ellipse cx="336" cy="350" rx="5" ry="4" fill="white" opacity=".25"/>
  <circle cx="308" cy="333" r="3" fill="#4c1d95" opacity=".3"/>
  <circle cx="372" cy="333" r="3" fill="#4c1d95" opacity=".3"/>

  <!-- SHIELD -->
  <path d="M340 304 L356 311 L356 326 Q356 337 340 342 Q324 337 324 326 L324 311 Z" fill="#92400e" opacity=".4"/>
  <path d="M340 303 L355 310 L355 325 Q355 336 340 341 Q325 336 325 325 L325 310 Z" fill="url(#shieldGold)"/>
  <path d="M340 303 L355 310 L355 325 Q355 336 340 341 Q325 336 325 325 L325 310 Z" fill="none" stroke="#fde68a" stroke-width="1.5" opacity=".6"/>
  <path d="M332 324 L337 330 L349 317" stroke="white" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M332 324 L337 330 L349 317" stroke="#fef3c7" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity=".7"/>
  <ellipse cx="338" cy="312" rx="7" ry="5" fill="white" opacity=".3" transform="rotate(-10,338,312)"/>

  <!-- FLOATING HEARTS -->
  <g style="animation:heartFloat1 2.8s ease-in-out infinite">
    <path d="M192,224 C192,218 185,218 185,212 C185,206 192,206 192,212 C192,206 199,206 199,212 C199,218 192,218 192,224Z" fill="url(#heartGrad)" filter="url(#tinyBlur)"/>
    <path d="M192,223 C192,218 186,218 186,213 C186,208 192,208 192,213 C192,208 198,208 198,213 C198,218 192,218 192,223Z" fill="#fda4af" opacity=".5"/>
  </g>
  <g style="animation:heartFloat2 3.2s ease-in-out infinite">
    <path d="M490,224 C490,218 483,218 483,212 C483,206 490,206 490,212 C490,206 497,206 497,212 C497,218 490,218 490,224Z" fill="url(#heartGrad)" filter="url(#tinyBlur)"/>
  </g>
  <g style="animation:heartFloat3 2.4s ease-in-out infinite">
    <path d="M340,168 C340,161 332,161 332,154 C332,147 340,147 340,154 C340,147 348,147 348,154 C348,161 340,161 340,168Z" fill="url(#heartGrad)" filter="url(#tinyBlur)" transform="scale(1.3) translate(-68,-40)"/>
  </g>

  <!-- PULSE RING -->
  <circle cx="340" cy="320" r="115" fill="none" stroke="#c4b5fd" stroke-width="2" opacity="0">
    <animate attributeName="r" values="112;158;158" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines=".4 0 .6 1;.4 0 .6 1"/>
    <animate attributeName="opacity" values=".55;0;0" dur="2.8s" repeatCount="indefinite" calcMode="spline" keySplines=".4 0 .6 1;.4 0 .6 1"/>
  </circle>
</g>
</svg>

<div class="title">Yoti · Versión Niños</div>
<div class="subtitle">Pseudo-3D · Perfiles A &amp; B · 8-13 años · YoTeCreo © 2026</div>
<div class="subtitle" style="margin-top:8px;color:rgba(167,139,250,.15);">Concepto, Diseño y Desarrollo · Luz C. Wong Naranjo</div>
</div>
</body>
</html>
